<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台灣手語學習遊戲 - Web 版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
            text-align: left;
            pointer-events: none;
            font-size: 16px;
            font-weight: 600;
            max-width: 500px;
        }

        #ui-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            pointer-events: auto;
        }

        #ui p {
            margin: 0;
            pointer-events: auto;
        }

        #ui select {
            pointer-events: auto;
        }

        .btn {
            font-size: 16px;
            padding: 8px 16px;
            background: #00aa00;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #00dd00;
        }

        .btn:disabled {
            background: #666666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn:disabled:hover {
            background: #666666;
        }

        .btn-pause {
            background: #ff6600;
        }

        .btn-pause:hover {
            background: #ff9900;
        }

        #video {
            position: absolute;
            right: 10px;
            top: 10px;
            width: 320px;
            height: 180px;
            border: 2px solid #0f0;
            z-index: 100;
            opacity: 1;
            display: block;
        }
    </style>
</head>

<body>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        .center-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px; padding: 20px 40px;
            background-color: #0f0; color: #000;
            border-radius: 12px; border: none; font-weight: bold;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
            z-index: 1000; cursor: pointer;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .top-left-state {
            position: absolute;
            top: 20px; left: 20px;
            transform: none; 
            font-size: 18px; padding: 10px 20px;
            background-color: #ffaa00; color: #000;
            border-radius: 5px; border: none; font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
            z-index: 1000; cursor: pointer;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>

    <div id="musicSelectionUI" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; justify-content: center; align-items: center; text-align: center;">
        <div style="background: #111; padding: 40px; border-radius: 15px; border: 2px solid #0f0; box-shadow: 0 0 30px rgba(0,255,0,0.3); max-width: 400px; width: 90%;">
            <h2 style="color: #fff; margin-bottom: 30px; letter-spacing: 2px;">準備開始遊戲</h2>
            
            <div style="margin-bottom: 25px;">
                <label for="audioUpload" style="display: inline-block; padding: 12px 24px; background: #333; color: #0f0; border-radius: 8px; cursor: pointer; border: 1px dashed #0f0; transition: 0.3s; width: 100%; box-sizing: border-box; font-weight: bold;">
                    📁 選擇本地音樂 (.mp3 / .wav)
                </label>
                <input type="file" id="audioUpload" accept="audio/*, audio/mp3, audio/wav, audio/mpeg, .mp3, .wav, .m4a, .aac" style="display: none;">
            </div>

            <p style="color: #666; margin: 15px 0;">— 或者 —</p>

            <button id="defaultMusicBtn" style="padding: 12px 24px; font-size: 16px; cursor: pointer; background: #0f0; color: #000; border: none; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.3s;">
                🎧 使用預設音樂試玩
            </button>

            <p id="parsingStatus" style="color: #0f0; margin-top: 20px; font-size: 14px; min-height: 20px;"></p>
        </div>
    </div>

    <button id="actionBtn" class="center-state" style="display: none;">開始遊戲</button>

    <div id="ui" style="position: absolute; top: 80px; left: 20px; color: white; text-shadow: 1px 1px 2px black; z-index: 100; pointer-events: none;">
        <div id="ui-row" style="pointer-events: auto; margin-bottom: 10px;">
            <select id="difficulty-select" style="font-size: 14px; padding: 4px; background: #333; color: #fff; border: 1px solid #777; border-radius: 4px; outline: none; cursor: pointer;">
                <option value="all">所有難度</option>
                <option value="1">等級 1 (簡單)</option>
                <option value="2">等級 2 (中等)</option>
                <option value="3">等級 3 (困難)</option>
            </select>
        </div>
        <p id="status" style="margin: 5px 0;">狀態: 準備中</p>
        <p id="score" style="margin: 5px 0;">房子數: 10</p>
        <p id="life" style="margin: 5px 0;">已掉落: 0/15</p>
        <p id="gesture" style="margin: 5px 0; color: #0f0;">偵測: 無</p>
        <p id="progress" style="margin: 5px 0;">進度: 等待手勢...</p>
    </div>

    <canvas id="canvas" width="600" height="800"></canvas>
    <video id="video" autoplay playsinline muted style="display: none;"></video>
    <audio id="bgmPlayer" crossorigin="anonymous" style="display: none;"></audio>

    <div id="leaderboard-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: #111; padding: 30px; border-radius: 15px; border: 3px solid #0f0; width: 85%; max-width: 400px; text-align: center; color: white; box-shadow: 0 0 20px rgba(0,255,0,0.5);">
            <h2 style="color: #0f0; margin-top: 0; font-size: 28px;">🌍 全球排行榜 🌍</h2>
            
            <ul id="leaderboard-list" style="list-style: none; padding: 0; margin: 20px 0; max-height: 300px; overflow-y: auto;">
                </ul>
            
            <button id="close-leaderboard-btn" style="padding: 12px 24px; font-size: 18px; cursor: pointer; background: #0f0; color: #000; border: none; border-radius: 8px; font-weight: bold; width: 100%;">
                關閉並重新開始
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script src="holistic_features.js?v=20260413"></script>
    <script type="module" src="app.js?v=999999"></script>
</body>
</html>
